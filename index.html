<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Good Night Home V11｜稳定通关 · 收纳疗愈房间</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="shell">
    <header class="topbar">
      <div class="brand">
        <span class="logo">🌙</span>
        <div>
          <h1>Good Night Home V11</h1>
          <p>Three.js · 稳定通关 · 收纳物品时学习心理知识</p>
        </div>
      </div>
      <div class="actions">
        <button id="btn-next">提示 / 继续</button>
        <button id="btn-map">心路地图</button>
        <button id="btn-card">晚安整合卡</button>
        <button id="btn-reset">重置</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel left" id="left-panel">
        <button class="collapse" data-target="left-panel">☰</button>
        <h2>当前章节</h2>
        <div class="chapter-card" id="chapter-card"></div>

        <h2>今晚任务</h2>
        <div id="quest-list"></div>
        <div class="meter"><div id="quest-meter"></div></div>

        <h2>灯光层级</h2>
        <div class="light-stack" id="light-stack"></div>
      </aside>

      <section class="stage-card">
        <div id="three-container"></div>
        <div class="bottom-dialogue">
          <div class="portrait">🐱</div>
          <div>
            <b>小理</b>
            <p id="dialogue">欢迎回来。今晚的房间会一层一层亮起来，不急着通关。</p>
          </div>
        </div>
      </section>

      <aside class="panel right" id="right-panel">
        <button class="collapse" data-target="right-panel">☰</button>

        <h2>当前携带</h2>
        <div class="inventory" id="inventory">空</div>

        <h2>疗愈知识卡</h2>
        <div class="skill-card" id="skill-card"></div>

        <h2>今晚输入</h2>
        <textarea id="journal-input" placeholder="这里可以写一句：我现在看见了什么？我想把什么放下？"></textarea>
        <div class="small-actions">
          <button id="btn-save-note">保存一句话</button>
          <button id="btn-journal">查看记录</button>
        </div>

        <h2>操作</h2>
        <div class="help">
          <p>拖动：轻微环绕视角</p>
          <p>滚轮：慢慢靠近或远离</p>
          <p>点击发光物：互动 / 拾取 / 放置</p>
          <p>Tab：切换下一个热点</p>
        </div>
      </aside>
    </main>
  </div>

  <div class="modal" id="modal">
    <div class="modal-card">
      <button class="modal-close" id="modal-close">×</button>
      <h2 id="modal-title">提示</h2>
      <div id="modal-body"></div>
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./src/main.js?v=11"></script>
</body>
</html>
